upstream backend       { server backend:8000; }
upstream ai_inference  { server ai_inference:8001; }
upstream video_pipeline { server video_pipeline:8002; }

server {
    listen 80;
    server_name _;

    # Platform Backend API + Swagger UI
    location / {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AI Inference service
    location /api/v1/ai/ {
        proxy_pass         http://ai_inference/api/v1/ai/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Video Pipeline service
    location /api/v1/video-pipeline/ {
        proxy_pass         http://video_pipeline/api/v1/video-pipeline/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow large uploads (video files)
        client_max_body_size 500M;
        proxy_read_timeout   300s;
    }
}
